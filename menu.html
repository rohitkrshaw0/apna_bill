<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<script src="./js/theme-init.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ApnaBill · Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/shared.css">
<style>
/* Page-specific: this page's .wrap is narrower/shorter than stock.html's, and it needs
   the bottom-nav body clearance that the cart/panel pages handle via their own padding. */
body.stock-app .wrap { max-width: 720px; padding: 20px 20px 40px; }
@media (max-width: 899px) { body { padding-bottom: 60px; } }
.section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted-ink); margin: 20px 4px 10px; }
.section-title:first-child { margin-top: 0; }
.menu-list { display: grid; gap: 10px; }
.menu-row { background: var(--paper); border: 1px solid var(--rule); border-radius: var(--r-lg); padding: 14px 16px; display: grid; grid-template-columns: 36px 1fr auto; gap: 12px; align-items: center; cursor: pointer; text-decoration: none; color: inherit; }
.menu-row:hover { border-color: var(--rule-strong); background: var(--paper-2); }
.menu-row .icon { width: 36px; height: 36px; border-radius: var(--r-md); background: var(--stamp-soft); color: var(--stamp); display: grid; place-items: center; }
.menu-row .icon svg { width: 18px; height: 18px; }
.menu-row .name { font-weight: 600; color: var(--ink); font-size: 15px; }
.menu-row .meta { color: var(--muted-ink); font-size: 12.5px; margin-top: 2px; }
.menu-row .chevron { color: var(--muted-ink); font-size: 20px; }
.hint { color: var(--muted-ink); font-size: 13px; padding: 20px 4px 0; text-align: center; }
</style>
</head>
<body class="stock-app">

<header class="topbar">
  <button id="back-btn" class="back-btn">
    Sale
  </button>
  <div class="brand"><span id="brand-company-name" class="brand-name">—</span><span class="brand-crumb">Menu</span></div>
  <div class="topbar-right">
    <nav class="nav-chips" id="nav-chips"></nav>
    <button id="theme-toggle" class="icon-btn theme-toggle" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">
    </button>
  </div>
</header>

<main class="wrap">
  <div class="section-title">Operations</div>
  <div class="menu-list">
    <a class="menu-row" href="purchase.html">
      <span class="icon" data-icon="purchases"></span>
      <div>
        <div class="name">Purchases</div>
        <div class="meta">Record stock coming in from suppliers</div>
      </div>
      <span class="chevron">›</span>
    </a>
    <a class="menu-row" href="manufacturing.html">
      <span class="icon" data-icon="mfg"></span>
      <div>
        <div class="name">Manufacturing</div>
        <div class="meta">Produce items from raw materials (BOM)</div>
      </div>
      <span class="chevron">›</span>
    </a>
  </div>
  <div class="hint">More sections (Reports, Firms, Settings) will show up here as they're added.</div>
</main>

<nav class="bottom-nav"></nav>

<script type="module">
import { supa, getActiveCompanyId, getActiveCompany } from './js/supabaseClient.js';
import { initThemeToggle } from './js/ui/theme.js';
import { initShell } from './js/ui/layout.js';
import { icon } from './js/ui/icons.js';

const $ = (s) => document.querySelector(s);

initThemeToggle();
initShell({ current: 'menu', backHref: 'sale.html', only: ['sale', 'items', 'stock'] });
document.querySelectorAll('.icon[data-icon]').forEach(el => {
  el.innerHTML = icon(el.dataset.icon, { size: 18 });
});

async function boot () {
  const { data: { session } } = await supa.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  if (!getActiveCompanyId()) { window.location.href = 'index.html'; return; }

  const co = await getActiveCompany();
  $('#brand-company-name').textContent = co?.name || '—';
}

boot().catch(err => console.error(err));
</script>

</body>
</html>
