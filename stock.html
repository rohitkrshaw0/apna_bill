<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<script src="./js/theme-init.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ApnaBill · Stock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/shared.css">
<style>
/* Page-specific: search box, dialog scrolling, sheet-actions and toast position
   are now shared with items.html/suppliers.html — see css/shared.css's
   "body.stock-app" block. Only this page's narrower dialog and the negative
   dialog subtitle spacing stay here. */
dialog { max-width: 520px; }
.sheet .sub { color: var(--muted-ink); font-size: 13px; margin-top: -6px; }
</style>
</head>
<body class="stock-app">

<header class="topbar">
  <button id="back-btn" class="back-btn">
    Sale
  </button>
  <div class="brand"><span id="brand-company-name" class="brand-name">—</span><span class="brand-crumb">Stock</span></div>
  <div class="topbar-right">
    <nav class="nav-chips" id="nav-chips"></nav>
    <button id="theme-toggle" class="icon-btn theme-toggle" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">
    </button>
  </div>
</header>

<nav class="sidebar" id="sidebar"></nav>
<nav class="bottom-nav"></nav>

<!-- ==== List view ==== -->
<main class="wrap" id="view-list">
  <div class="toolbar">
    <div class="search-wrap">
      <svg class="icon-search" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" class="search" type="search" placeholder="Search by item name or code…">
    </div>
  </div>
  <div class="filter-row">
    <button class="filter-pill active" data-filter="all">All items</button>
    <button class="filter-pill" data-filter="low-stock">Low stock only</button>
    <button class="filter-pill" data-filter="with-batches">With batches only</button>
  </div>
  <div id="list" class="list"></div>
  <div id="list-empty" class="empty hidden">
    <h3>No items match</h3>
    <p>Try a different search or filter.</p>
  </div>
</main>

<!-- ==== Drill view ==== -->
<main class="wrap hidden" id="view-drill">
  <button class="back-link" id="drill-back">← Back to items</button>
  <div class="drill-header">
    <h2 id="drill-item-name">—</h2>
    <div class="meta" id="drill-item-meta">—</div>
  </div>
  <div class="summary-row">
    <div class="summary-stat">
      <div class="stat-label">Total stock</div>
      <div class="stat-value" id="drill-total-qty">0</div>
    </div>
    <div class="summary-stat">
      <div class="stat-label">Batches</div>
      <div class="stat-value" id="drill-batch-count">0</div>
    </div>
  </div>
  <div id="batch-list" class="list"></div>
  <div id="batch-empty" class="empty hidden">
    <h3>No batches yet</h3>
    <p>This item has no batch records — batches are created when you purchase stock for it.</p>
  </div>
</main>

<div id="toasts" class="toasts"></div>

<!-- Adjust stock dialog -->
<dialog id="dlg-adjust">
  <form method="dialog" class="sheet" id="adjust-form">
    <h2>Adjust stock</h2>
    <div class="sub" id="adjust-target-label"></div>
    <!-- Populated by renderAdjustFormFields() below via the Form Framework
         (js/ui/forms) — see that function for the field definitions. -->
    <div class="form-grid" id="adjust-fields-grid"></div>
    <div class="adjust-preview" id="adjust-preview">Enter an adjustment to preview the new quantity.</div>
    <div class="sheet-actions">
      <button type="button" class="btn ghost" id="adjust-cancel">Cancel</button>
      <button type="submit" class="btn primary">Save adjustment</button>
    </div>
  </form>
</dialog>

<!-- Stock ledger history dialog -->
<dialog id="dlg-history">
  <div class="sheet">
    <h2>Stock ledger</h2>
    <div class="sub" id="history-target-label"></div>
    <div id="history-list" class="ledger-list"></div>
    <div id="history-empty" class="empty hidden"><h3>No transactions yet</h3></div>
    <div class="sheet-actions">
      <button class="btn ghost" id="history-close">Close</button>
    </div>
  </div>
</dialog>

<script type="module">
import { supa, getActiveCompanyId, getActiveCompany } from './js/supabaseClient.js';
import {
  listItemsWithStock, listBatchesForItem,
  getStockLedgerForBatch, getStockLedgerForItem,
  recordStockAdjustment
} from './js/items.js';
import { createToaster } from './js/ui/toast.js';
import { createBadge } from './js/ui/badge.js';
import { escapeHtml as escape } from './js/ui/escape.js';
import { initThemeToggle } from './js/ui/theme.js';
import { initShell } from './js/ui/layout.js';
import { debounce } from './js/ui/debounce.js';
import { createListRow, createDataTable } from './js/ui/dataTable.js';
import { textField, numberField, selectField, renderFieldsInto } from './js/ui/forms/index.js';

const $  = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);
const fmt = (n) => '₹' + (Math.round((+n || 0) * 100) / 100).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const toast = createToaster('toasts');
const itemsTable = createDataTable({ listSelector: '#list', emptySelector: '#list-empty', renderRow: renderItemRow });

initThemeToggle();
initShell({ current: 'stock', backHref: 'sale.html' });
renderAdjustFormFields();

// Builds the adjust-stock form's fields via the Form Framework and
// inserts them into the static grid container left in the markup above.
// Runs once at page load — openAdjust()/onSaveAdjustment() below read
// and write these fields by id exactly as they did before this
// migration; only the markup that produces them changed.
function renderAdjustFormFields () {
  const currentField = textField({ id: 'adj-current', label: 'Current quantity', disabled: true });
  const qtyField = numberField({ id: 'adj-qty', label: 'Adjustment (+/−)', required: true, step: 'any', min: null });
  const reasonField = selectField({
    id: 'adj-reason', label: 'Reason', required: true, className: 'full',
    options: [
      { value: '', label: 'Select reason…' },
      'Damage', 'Shrinkage / Loss', 'Recount / Correction',
      'Return from customer', 'Transfer out', 'Other'
    ]
  });
  const notesField = textField({ id: 'adj-notes', label: 'Notes (optional)', className: 'full' });
  renderFieldsInto($('#adjust-fields-grid'), [currentField, qtyField, reasonField, notesField]);
}

const state = {
  company: null,
  view: 'list',
  q: '',
  filterMode: 'all',       // 'all' | 'low-stock' | 'with-batches'
  items: [],                // all track_stock items (unfiltered by filterMode)
  selectedItem: null,
  batches: [],
  adjustTarget: null        // { item_id, batch_id, label, currentQty }
};

async function boot () {
  const { data: { session } } = await supa.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  if (!getActiveCompanyId()) { window.location.href = 'index.html'; return; }

  const co = await getActiveCompany();
  state.company = co;
  $('#brand-company-name').textContent = co?.name || '—';

  $('#search').addEventListener('input', debounce(() => { state.q = $('#search').value; loadItems(); }, 220));
  $$('.filter-row .filter-pill').forEach(p => p.addEventListener('click', () => {
    $$('.filter-row .filter-pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    state.filterMode = p.dataset.filter;
    renderListView();
  }));

  $('#drill-back').addEventListener('click', () => showListView());

  $('#adjust-cancel').addEventListener('click', () => $('#dlg-adjust').close());
  $('#adjust-form').addEventListener('submit', onSaveAdjustment);
  $('#adj-qty').addEventListener('input', updateAdjustPreview);

  $('#history-close').addEventListener('click', () => $('#dlg-history').close());

  await loadItems();
}

// -------- list view --------
async function loadItems () {
  try {
    const { items } = await listItemsWithStock({ q: state.q, limit: 200, offset: 0, activeOnly: true });
    state.items = items.filter(it => it.track_stock);
    renderListView();
  } catch (e) { console.error(e); toast('Could not load stock: ' + e.message, 'warn', 6000); }
}

function stockClass (it) {
  if (!(it.low_stock_threshold > 0)) return '';
  if (it.stock_qty <= it.low_stock_threshold * 0.5) return 'severe';
  if (it.stock_qty <= it.low_stock_threshold) return 'low';
  return '';
}

function renderListView () {
  const rows = state.items.filter(it => {
    if (state.filterMode === 'low-stock') return stockClass(it) !== '';
    if (state.filterMode === 'with-batches') return !!it.track_batches;
    return true;
  });
  itemsTable.setRows(rows);
}

function renderItemRow (it) {
  const cls = stockClass(it);
  return createListRow({
    primaryText: it.name,
    badgesHtml: `${it.track_batches ? createBadge('Batches', 'neutral') : ''}${cls === 'severe' ? createBadge('⚠ Very low', 'warn') : (cls === 'low' ? createBadge('⚠ Low', 'info') : '')}`,
    meta: `${it.code ? escape(it.code) + ' · ' : ''}${escape(it.unit)}${it.low_stock_threshold > 0 ? ' · threshold ' + (+it.low_stock_threshold).toFixed(2) : ''}`,
    values: [
      { className: `stock-chip ${cls}`, html: `${(+it.stock_qty).toFixed(2)} ${escape(it.unit)}` }
    ],
    trailing: { type: 'chevron' },
    onClick: () => openDrill(it)
  });
}

// -------- drill view --------
function showListView () {
  state.view = 'list';
  $('#view-drill').classList.add('hidden');
  $('#view-list').classList.remove('hidden');
}
async function openDrill (item) {
  state.selectedItem = item;
  state.view = 'drill';
  $('#view-list').classList.add('hidden');
  $('#view-drill').classList.remove('hidden');
  $('#drill-item-name').textContent = item.name;
  $('#drill-item-meta').textContent = `${item.code ? item.code + ' · ' : ''}${item.unit}${item.track_batches ? ' · batch-tracked' : ' · aggregate stock'}`;
  await loadDrillBatches();
}
async function loadDrillBatches () {
  const item = state.selectedItem;
  if (item.track_batches) {
    try {
      state.batches = await listBatchesForItem(item.id);
    } catch (e) { console.error(e); toast('Could not load batches: ' + e.message, 'warn', 6000); state.batches = []; }
  } else {
    state.batches = null; // aggregate-only item, no batch rows
  }
  renderDrillView();
}
function renderDrillView () {
  const item = state.selectedItem;
  const wrap = $('#batch-list'); wrap.innerHTML = '';

  if (!item.track_batches) {
    $('#batch-empty').classList.add('hidden');
    $('#drill-total-qty').textContent = (+item.stock_qty).toFixed(2) + ' ' + item.unit;
    $('#drill-batch-count').textContent = '—';
    const row = document.createElement('div');
    row.className = 'stock-batch-row';
    row.innerHTML = `
      <div>
        <div class="name">Aggregate stock</div>
        <div class="meta">This item does not track individual batches.</div>
      </div>
      <div class="stock-chip">${(+item.stock_qty).toFixed(2)} ${escape(item.unit)}</div>
      <div class="batch-actions">
        <button class="btn-mini" data-adjust>Adjust</button>
        <button class="btn-mini ghost" data-history>History</button>
      </div>`;
    row.querySelector('[data-adjust]').addEventListener('click', () => openAdjust({
      item_id: item.id, batch_id: null, label: item.name, currentQty: +item.stock_qty || 0
    }));
    row.querySelector('[data-history]').addEventListener('click', () => openHistory({ itemId: item.id, label: item.name }));
    wrap.appendChild(row);
    return;
  }

  const batches = state.batches || [];
  const totalQty = batches.reduce((s, b) => s + (+b.qty_on_hand || 0), 0);
  $('#drill-total-qty').textContent = totalQty.toFixed(2) + ' ' + item.unit;
  $('#drill-batch-count').textContent = batches.length;
  $('#batch-empty').classList.toggle('hidden', batches.length > 0);

  for (const b of batches) {
    const label = [b.batch_no, b.shade, b.size].filter(Boolean).join(' · ') || '(no label)';
    const qty = +b.qty_on_hand || 0;
    const row = document.createElement('div');
    row.className = 'stock-batch-row';
    row.innerHTML = `
      <div>
        <div class="name">${escape(label)}</div>
        <div class="meta">Cost ${fmt(b.cost_price)}${b.mrp != null ? ' · MRP ' + fmt(b.mrp) : ''}</div>
      </div>
      <div class="stock-chip ${qty <= 0 ? 'severe' : ''}">${qty.toFixed(2)} ${escape(item.unit)}</div>
      <div class="batch-actions">
        <button class="btn-mini" data-adjust>Adjust</button>
        <button class="btn-mini ghost" data-history>History</button>
      </div>`;
    row.querySelector('[data-adjust]').addEventListener('click', () => openAdjust({
      item_id: item.id, batch_id: b.id, label: item.name + ' — ' + label, currentQty: qty
    }));
    row.querySelector('[data-history]').addEventListener('click', () => openHistory({ batchId: b.id, label: item.name + ' — ' + label }));
    wrap.appendChild(row);
  }
}

// -------- adjust dialog --------
function openAdjust ({ item_id, batch_id, label, currentQty }) {
  state.adjustTarget = { item_id, batch_id, label, currentQty };
  $('#adjust-target-label').textContent = label;
  $('#adj-current').value = currentQty.toFixed(2);
  $('#adj-qty').value = '';
  $('#adj-reason').value = '';
  $('#adj-notes').value = '';
  $('#adjust-preview').textContent = 'Enter an adjustment to preview the new quantity.';
  $('#adjust-preview').classList.remove('negative');
  $('#dlg-adjust').showModal();
}
function updateAdjustPreview () {
  const t = state.adjustTarget;
  if (!t) return;
  const adj = parseFloat($('#adj-qty').value);
  if (isNaN(adj) || adj === 0) {
    $('#adjust-preview').textContent = 'Enter an adjustment to preview the new quantity.';
    $('#adjust-preview').classList.remove('negative');
    return;
  }
  const newQty = t.currentQty + adj;
  $('#adjust-preview').innerHTML = `New quantity: ${t.currentQty.toFixed(2)} ${adj > 0 ? '+' : '−'} ${Math.abs(adj).toFixed(2)} = <strong>${newQty.toFixed(2)}</strong>`;
  $('#adjust-preview').classList.toggle('negative', newQty < 0);
}
async function onSaveAdjustment (e) {
  e.preventDefault();
  const t = state.adjustTarget;
  const adj = parseFloat($('#adj-qty').value);
  const reason = $('#adj-reason').value;
  if (!adj || isNaN(adj)) { toast('Enter a non-zero adjustment quantity', 'warn'); return; }
  if (!reason) { toast('Pick a reason for this adjustment', 'warn'); return; }
  const btn = $('#adjust-form').querySelector('button[type="submit"]');
  btn.disabled = true;
  try {
    const res = await recordStockAdjustment({
      item_id: t.item_id, batch_id: t.batch_id,
      adjustment_qty: adj, reason, notes: $('#adj-notes').value.trim() || null
    });
    $('#dlg-adjust').close();
    toast(`Adjusted ${t.label} by ${adj > 0 ? '+' : ''}${adj}. New qty: ${(+res.new_qty_on_hand).toFixed(2)}`, 'ok', 4000);
    if (res.went_negative) toast(`${t.label} is now below zero — worth a recount or a purchase entry.`, 'warn', 6000);
    await loadDrillBatches();
    await loadItems();
  } catch (err) {
    console.error(err);
    toast('Could not save adjustment: ' + err.message, 'warn', 6000);
  } finally {
    btn.disabled = false;
  }
}

// -------- history dialog --------
async function openHistory ({ batchId, itemId, label }) {
  $('#history-target-label').textContent = label;
  $('#history-list').innerHTML = '';
  $('#history-empty').classList.add('hidden');
  $('#dlg-history').showModal();
  try {
    const rows = batchId ? await getStockLedgerForBatch(batchId) : await getStockLedgerForItem(itemId);
    renderHistory(rows);
  } catch (e) { console.error(e); toast('Could not load history: ' + e.message, 'warn', 6000); }
}
function renderHistory (rows) {
  const wrap = $('#history-list'); wrap.innerHTML = '';
  $('#history-empty').classList.toggle('hidden', rows.length > 0);
  for (const r of rows) {
    const net = (+r.qty_in || 0) - (+r.qty_out || 0);
    const when = r.txn_date ? new Date(r.txn_date).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' }) : '';
    const ref = r.notes || (r.ref_table ? r.ref_table + (r.ref_id ? ' #' + String(r.ref_id).slice(0, 8) : '') : '');
    const row = document.createElement('div');
    row.className = 'ledger-row';
    row.innerHTML = `
      <div class="ledger-date">${escape(when)}</div>
      <div class="ledger-type">${escape(r.txn_type)}</div>
      <div class="ledger-qty ${net >= 0 ? 'in' : 'out'}">${net >= 0 ? '+' : ''}${net.toFixed(2)}</div>
      ${ref ? `<div class="ledger-notes">${escape(ref)}</div>` : ''}`;
    wrap.appendChild(row);
  }
}

boot().catch(err => { console.error(err); toast('Startup error: ' + err.message, 'warn', 8000); });
</script>

</body>
</html>
