<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<script src="./js/theme-init.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ApnaBill · Items</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/shared.css">
<style>
/* Page-specific: items.html's search box, kebab menu, and dialogs are sized a little
   differently from stock.html (which otherwise shares this page's topbar/list styling). */
input.search { width: 100%; max-width: none; height: 48px; padding: 0 16px 0 42px; border: 1px solid var(--rule-strong); border-radius: var(--r-lg); font-size: 15px; }
.kebab { width: 36px; height: 36px; }
.menu { top: 40px; }
.stock-chip { font-size: 13px; }
.stock-chip.low { color: var(--madder); font-weight: 600; }
dialog { max-width: 640px; max-height: 92vh; }
.sheet { gap: 16px; overflow-y: auto; max-height: 92vh; }
.sheet-actions { justify-content: space-between; margin-top: 4px; }
.toasts { bottom: 24px; }
</style>
</head>
<body class="stock-app">

<header class="topbar">
  <button id="back-btn" class="back-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Sale
  </button>
  <div class="brand"><span id="brand-company-name" class="brand-name">—</span><span class="brand-crumb">Items</span></div>
  <div class="topbar-right">
    <nav class="nav-chips" id="nav-chips"></nav>
    <button id="theme-toggle" class="icon-btn theme-toggle" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/></svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<nav class="bottom-nav"></nav>

<main class="wrap">
  <div class="toolbar">
    <div class="search-wrap">
      <svg class="icon-search" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" class="search" type="search" placeholder="Search items by name or code…">
    </div>
    <button id="btn-add" class="btn-add">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add item
    </button>
  </div>

  <div class="filter-row">
    <button class="filter-pill active" data-filter="active">Active</button>
    <button class="filter-pill" data-filter="all">All (incl. inactive)</button>
  </div>

  <div id="list" class="list"></div>
  <div id="empty" class="empty hidden">
    <h3>No items yet</h3>
    <p>Add your first item — fabric, ready-made, or a service.</p>
  </div>
  <div class="loadmore hidden" id="loadmore-wrap">
    <button class="btn-more" id="btn-more">Load more</button>
  </div>
</main>

<div id="toasts" class="toasts"></div>

<!-- ==== Item form dialog (add / edit) ==== -->
<dialog id="dlg-item">
  <form method="dialog" class="sheet" id="item-form">
    <h2 id="item-form-title">Add item</h2>

    <div class="field-group">
      <div class="fg-title">Basics</div>
      <div class="kind-toggle">
        <button type="button" class="kind-btn active" id="kind-goods" data-kind="goods">Goods</button>
        <button type="button" class="kind-btn" id="kind-service" data-kind="service">Service</button>
      </div>
      <div class="form-grid">
        <label class="full"><span>Item name *</span><input id="f-name" required></label>
        <label><span>Code / SKU (barcode)</span>
          <div class="code-row">
            <input id="f-code">
            <button type="button" class="btn-gen" id="f-code-gen" title="Generate barcode">⚡</button>
          </div>
        </label>
        <label><span>Unit</span><input id="f-unit" list="units" value="PCS"></label>
      </div>
      <datalist id="units">
        <option value="PCS"><option value="MTR"><option value="KG"><option value="LTR"><option value="BOX"><option value="SET"><option value="PAIR">
      </datalist>
    </div>

    <div class="field-group">
      <div class="fg-title">Tax</div>
      <div class="form-grid">
        <label><span>HSN / SAC code</span><input id="f-hsn"></label>
        <label><span>Cess % (if any)</span><input id="f-cess" type="number" step="any" min="0" value="0"></label>
        <label class="full">
          <span>GST rate %</span>
          <input id="f-gst" type="number" step="any" min="0" value="0">
          <div class="gst-quick" id="gst-quick">
            <button type="button" data-rate="0">0%</button>
            <button type="button" data-rate="5">5%</button>
            <button type="button" data-rate="12">12%</button>
            <button type="button" data-rate="18">18%</button>
            <button type="button" data-rate="28">28%</button>
          </div>
        </label>
        <label class="full chk-row" style="flex-direction:row;">
          <input id="f-inclusive" type="checkbox"><span>Prices entered below are tax-inclusive</span>
        </label>
      </div>
    </div>

    <div class="field-group">
      <div class="fg-title">Pricing</div>
      <div class="form-grid">
        <label><span>Retail price</span><input id="f-retail" type="number" step="any" min="0" value="0"></label>
        <label><span>Wholesale price</span><input id="f-wholesale" type="number" step="any" min="0" value="0"></label>
        <label><span>Default purchase price</span><input id="f-purchase" type="number" step="any" min="0" value="0"></label>
      </div>
    </div>

    <div class="field-group" id="stock-group">
      <div class="fg-title">Stock</div>
      <div class="form-grid">
        <label class="full chk-row" style="flex-direction:row;">
          <input id="f-track-stock" type="checkbox" checked><span>Track stock for this item</span>
        </label>
        <label class="full chk-row" style="flex-direction:row;">
          <input id="f-track-batches" type="checkbox" checked><span>Use batches (shade / size / MRP) — good for fabric</span>
        </label>
        <label><span>Low stock alert below</span><input id="f-low-stock" type="number" step="any" min="0" value="0"></label>
      </div>
    </div>

    <div class="sheet-actions">
      <button type="button" class="btn ghost" id="item-cancel">Cancel</button>
      <button type="submit" class="btn primary" id="item-submit">Save item</button>
    </div>
  </form>
</dialog>

<!-- ==== Delete confirm ==== -->
<dialog id="dlg-delete">
  <div class="sheet">
    <h2 style="color: var(--madder);">Delete this item?</h2>
    <div class="sub" style="color: var(--muted-ink); font-size: 13px;">
      <span id="del-item-name" style="color: var(--ink); font-weight: 600;"></span> will be permanently removed.
      This only works if it has never been used in a purchase, sale, or stock batch — otherwise, deactivate it instead.
    </div>
    <div class="sheet-actions">
      <button class="btn ghost" id="del-cancel">Cancel</button>
      <button class="btn danger" id="del-yes">Delete forever</button>
    </div>
  </div>
</dialog>

<script type="module">
import { supa, getActiveCompanyId, getActiveCompany } from './js/supabaseClient.js';
import { listItemsWithStock, getItem, createItem, updateItem, setItemActive, deleteItemHard } from './js/items.js';
import { createToaster } from './js/ui/toast.js';
import { createBadge } from './js/ui/badge.js';
import { escapeHtml as escape } from './js/ui/escape.js';
import { generateBarcodeCode } from './js/ui/barcode.js';
import { initThemeToggle } from './js/ui/theme.js';
import { initShell } from './js/ui/layout.js';
import { debounce } from './js/ui/debounce.js';
import { createListRow, createDataTable } from './js/ui/dataTable.js';
import { initKebabAutoClose } from './js/ui/kebabMenu.js';

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);
const fmt = (n) => '₹' + (Math.round((+n || 0) * 100) / 100).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const toast = createToaster('toasts');
const itemsTable = createDataTable({ listSelector: '#list', emptySelector: '#empty', renderRow: renderItemRow });

initThemeToggle();
initShell({ current: 'items', backHref: 'sale.html' });
initKebabAutoClose();

const state = { q: '', activeOnly: true, offset: 0, limit: 40, total: 0, editingId: null };

async function boot () {
  const { data: { session } } = await supa.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  if (!getActiveCompanyId()) { window.location.href = 'index.html'; return; }

  const co = await getActiveCompany();
  $('#brand-company-name').textContent = co?.name || '—';

  $('#search').addEventListener('input', debounce(() => { state.offset = 0; loadList(true); }, 220));

  $$('.filter-pill').forEach(p => p.addEventListener('click', () => {
    $$('.filter-pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    state.activeOnly = p.dataset.filter === 'active';
    state.offset = 0;
    loadList(true);
  }));

  $('#btn-add').addEventListener('click', () => openForm(null));
  $('#item-cancel').addEventListener('click', () => $('#dlg-item').close());
  $('#item-form').addEventListener('submit', onSubmitForm);
  $('#btn-more').addEventListener('click', () => { state.offset += state.limit; loadList(false); });

  $('#f-code-gen').addEventListener('click', () => {
    const code = generateBarcodeCode();
    $('#f-code').value = code;
    navigator.clipboard?.writeText(code).catch(() => {});
    toast('Barcode generated: ' + code, 'ok', 2500);
  });
  $('#kind-goods').addEventListener('click', () => setKind('goods'));
  $('#kind-service').addEventListener('click', () => setKind('service'));
  $$('#gst-quick button').forEach(b => b.addEventListener('click', () => {
    $('#f-gst').value = b.dataset.rate;
    $$('#gst-quick button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
  }));
  $('#f-gst').addEventListener('input', () => {
    $$('#gst-quick button').forEach(x => x.classList.toggle('active', x.dataset.rate === $('#f-gst').value));
  });

  $('#del-cancel').addEventListener('click', () => $('#dlg-delete').close());
  $('#del-yes').addEventListener('click', onConfirmDelete);

  await loadList(true);
}

function setKind (kind) {
  $('#kind-goods').classList.toggle('active', kind === 'goods');
  $('#kind-service').classList.toggle('active', kind === 'service');
  const isService = kind === 'service';
  $('#stock-group').classList.toggle('hidden', isService);
  if (isService) {
    $('#f-track-stock').checked = false;
    $('#f-track-batches').checked = false;
  }
}
function currentKind () { return $('#kind-service').classList.contains('active') ? 'service' : 'goods'; }

async function loadList (reset) {
  try {
    const { items, count } = await listItemsWithStock({
      q: $('#search').value, limit: state.limit, offset: state.offset, activeOnly: state.activeOnly
    });
    state.total = count;
    itemsTable.setRows(items, { append: !reset });
    $('#loadmore-wrap').classList.toggle('hidden', state.offset + items.length >= count || items.length === 0);
  } catch (e) {
    console.error(e); toast('Could not load items: ' + e.message, 'warn', 6000);
  }
}

function renderItemRow (it) {
  const low = it.track_stock && it.low_stock_threshold > 0 && it.stock_qty <= it.low_stock_threshold;
  return createListRow({
    primaryText: it.name,
    badgesHtml: `${it.kind === 'service' ? createBadge('Service', 'info') : ''}${!it.is_active ? createBadge('Inactive', 'warn') : ''}`,
    meta: `${it.code ? escape(it.code) + ' · ' : ''}${escape(it.unit)} · GST ${it.gst_rate}%${it.hsn_sac ? ' · HSN ' + escape(it.hsn_sac) : ''}`,
    values: [
      { className: `stock-chip ${low ? 'low' : ''}`, html: it.track_stock ? `${it.stock_qty.toFixed(2)} ${escape(it.unit)}` : '' },
      { className: 'price-col', html: fmt(it.default_retail_price) }
    ],
    trailing: {
      type: 'kebab',
      actions: [
        { label: 'Edit', onClick: () => openForm(it.id) },
        it.is_active
          ? { label: 'Deactivate', onClick: async () => {
              try { await setItemActive(it.id, false); toast('Deactivated', 'ok'); loadList(true); }
              catch (err) { toast('Failed: ' + err.message, 'warn'); }
            } }
          : { label: 'Reactivate', onClick: async () => {
              try { await setItemActive(it.id, true); toast('Reactivated', 'ok'); loadList(true); }
              catch (err) { toast('Failed: ' + err.message, 'warn'); }
            } },
        { label: 'Delete', danger: true, onClick: () => {
            $('#del-item-name').textContent = it.name;
            $('#dlg-delete').dataset.id = it.id;
            $('#dlg-delete').showModal();
          } }
      ]
    },
    onClick: () => openForm(it.id)
  });
}

async function onConfirmDelete () {
  const id = $('#dlg-delete').dataset.id;
  try {
    await deleteItemHard(id);
    $('#dlg-delete').close();
    toast('Item deleted', 'ok');
    loadList(true);
  } catch (err) {
    $('#dlg-delete').close();
    toast('Could not delete — it\'s used in stock or invoices. Try Deactivate instead.', 'warn', 6000);
  }
}

async function openForm (id) {
  state.editingId = id;
  $('#item-form').reset();
  $('#f-gst').value = 0; $('#f-cess').value = 0;
  $('#f-retail').value = 0; $('#f-wholesale').value = 0; $('#f-purchase').value = 0;
  $('#f-unit').value = 'PCS'; $('#f-low-stock').value = 0;
  $('#f-track-stock').checked = true; $('#f-track-batches').checked = true;
  setKind('goods');
  $$('#gst-quick button').forEach(x => x.classList.remove('active'));

  if (id) {
    $('#item-form-title').textContent = 'Edit item';
    try {
      const it = await getItem(id);
      $('#f-name').value = it.name || '';
      $('#f-code').value = it.code || '';
      $('#f-unit').value = it.unit || 'PCS';
      $('#f-hsn').value = it.hsn_sac || '';
      $('#f-gst').value = it.gst_rate || 0;
      $('#f-cess').value = it.cess_rate || 0;
      $('#f-inclusive').checked = !!it.is_price_inclusive;
      $('#f-retail').value = it.default_retail_price || 0;
      $('#f-wholesale').value = it.default_wholesale_price || 0;
      $('#f-purchase').value = it.default_purchase_price || 0;
      $('#f-track-stock').checked = !!it.track_stock;
      $('#f-track-batches').checked = !!it.track_batches;
      $('#f-low-stock').value = it.low_stock_threshold || 0;
      setKind(it.kind || 'goods');
      $$('#gst-quick button').forEach(x => x.classList.toggle('active', x.dataset.rate === String(it.gst_rate)));
    } catch (e) { toast('Could not load item: ' + e.message, 'warn'); return; }
  } else {
    $('#item-form-title').textContent = 'Add item';
  }
  $('#dlg-item').showModal();
}

async function onSubmitForm (e) {
  e.preventDefault();
  const btn = $('#item-submit');
  btn.disabled = true;
  const original = btn.textContent; btn.textContent = 'Saving…';
  try {
    const kind = currentKind();
    const payload = {
      name: $('#f-name').value.trim(),
      code: $('#f-code').value.trim() || null,
      kind,
      unit: $('#f-unit').value.trim() || 'PCS',
      hsn_sac: $('#f-hsn').value.trim() || null,
      gst_rate: +$('#f-gst').value || 0,
      cess_rate: +$('#f-cess').value || 0,
      is_price_inclusive: $('#f-inclusive').checked,
      default_retail_price: +$('#f-retail').value || 0,
      default_wholesale_price: +$('#f-wholesale').value || 0,
      default_purchase_price: +$('#f-purchase').value || 0,
      track_stock: kind === 'service' ? false : $('#f-track-stock').checked,
      track_batches: kind === 'service' ? false : $('#f-track-batches').checked,
      low_stock_threshold: +$('#f-low-stock').value || 0
    };
    if (!payload.name) { toast('Item name is required', 'warn'); return; }

    if (state.editingId) {
      await updateItem(state.editingId, payload);
      toast('Item updated', 'ok');
    } else {
      await createItem(payload);
      toast('Item added', 'ok');
    }
    $('#dlg-item').close();
    state.offset = 0;
    await loadList(true);
  } catch (err) {
    const msg = err.code === '23505'
      ? 'That code / barcode is already used by another item — try a different one.'
      : err.message;
    toast('Could not save: ' + msg, 'warn', 6000);
  } finally {
    btn.disabled = false; btn.textContent = original;
  }
}

boot().catch(err => { console.error(err); toast('Startup error: ' + err.message, 'warn', 8000); });
</script>
</body>
</html>
